<div class="form-contenedor">
  <h2>Editar Stock</h2>

  <p *ngIf="cargando">Cargando datos...</p>

  <form *ngIf="!cargando" [formGroup]="formulario" (ngSubmit)="guardar()">
    <div class="campo">
      <label for="cantidad_stock">Cantidad en stock</label>
      <input
        id="cantidad_stock"
        type="number"
        formControlName="cantidad_stock"
      />
      <span
        class="error"
        *ngIf="
          formulario.get('cantidad_stock')?.invalid &&
          formulario.get('cantidad_stock')?.touched
        "
      >
        La cantidad es obligatoria y debe ser mayor o igual a 0
      </span>
    </div>

    <div class="campo">
      <label for="stock_min">Stock mínimo</label>
      <input id="stock_min" type="number" formControlName="stock_min" />
      <span
        class="error"
        *ngIf="
          formulario.get('stock_min')?.invalid &&
          formulario.get('stock_min')?.touched
        "
      >
        El stock mínimo es obligatorio y debe ser mayor o igual a 0
      </span>
    </div>

    <div class="botones">
      <button type="submit" [disabled]="formulario.invalid || guardando">
        {{ guardando ? "Guardando..." : "Guardar cambios" }}
      </button>
      <button type="button" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
