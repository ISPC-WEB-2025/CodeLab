
<form class="p-4 border rounded shadow-sm ">
    <h3 class="mb-4 alta">Alta de Productos</h3>
    <p>Ingresa los datos del nuevo producto para agregarlo a tu inventario:</p>
    <div class="fila-form">
        <div class="col-md-6">
            <label for="nombre" class="form-label">Nombre del Producto</label>
            <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingresa un nombre" [(ngModel)]="producto.nombre">
        </div>
        <div class="col-md-4">
            <label for="codigo" class="form-label">Código</label>
            <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Ingresa el código del producto (único)" [(ngModel)]="producto.codigo">
        </div>
    </div>
<div class="fila-form">

  <div class="col-md-5">
    <label for="precioVenta" class="form-label">
      Precio de Venta <span class="text-muted">(Opcional)</span>
    </label>
    <div class="input-group">
      <span class="input-group-text">$</span>
      <input type="number" id="precioVenta" name="precioVenta" class="form-control" placeholder="0.00" min="0" [(ngModel)]="producto.precio_venta">
    </div>
  </div>

  <div class="col-md-5">
    <label for="categoria" class="form-label">Categoría</label>
    <select id="categoria" name="categoria" class="form-select" [(ngModel)]="producto.id_cat">
      <option value="">Seleccione una opción...</option>
       <option *ngFor="let cat of categorias" [value]="cat.id_cat">{{ cat.nombre }}</option>
    </select>
  </div>

</div>
    <div class="fila-form">
    <div class="col-md-10">
            <label for="descripcion" class="form-label">Descripción <span class="text-muted">(Opcional)</span></label>
             <textarea id="descripcion" name="descripcion" class="form-control" rows="3" placeholder="Ingresa una descripción..." [(ngModel)]="producto.descripcion"></textarea>
        </div>
    </div>
    <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-primary px-4" (click)="guardar()">Guardar</button>
    </div>

</form>
