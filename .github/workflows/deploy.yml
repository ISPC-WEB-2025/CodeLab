name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - develop  # Se ejecuta cada vez que subas cambios a develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # O la versión que estés usando localmente

      - name: Install dependencies
        run: npm install
        working-directory: Frontend/app-stock

      - name: Build
        run: npx ng build --base-href "https://ispc-web-2025.github.io/CodeLab/"
        working-directory: Frontend/app-stock

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Frontend/app-stock/dist/app-stock/browser # Verifica si tu build genera esta ruta
          branch: gh-pages # Rama donde se subirá el contenido estático